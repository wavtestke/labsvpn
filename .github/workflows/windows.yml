name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download hiddify-core prebuilt binaries
        shell: bash
        run: |
          mkdir -p hiddify-core/bin
          curl -L -o hiddify-core.tar.gz https://github.com/hiddify/hiddify-core/releases/download/v4.1.0/hiddify-lib-windows-amd64.tar.gz
          tar -xzf hiddify-core.tar.gz -C hiddify-core/bin
          ls -la hiddify-core/bin/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build installer with Inno Setup
        run: |
          iscc windows\installer.iss /O"${{ github.workspace }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabsVPN-Windows-Installer
          path: LabsVPN-Setup.exe
          retention-days: 30
